# Kitty defaults for consistent desktop style.
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0

# Inner terminal padding for visual consistency with Sway gaps.
window_padding_width 15

# Light transparency to match compositor styling.
background_opacity 0.70
# Blur is handled by SwayFX compositor effects.

# Use simple default behavior and keep config deterministic.
confirm_os_window_close 0
