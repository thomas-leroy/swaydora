# Kitty defaults for consistent desktop style.
font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto
font_size 11.0

# Inner terminal padding for visual consistency with Sway gaps.
window_padding_width 15

# Light transparency to match compositor styling.
background_opacity 0.85
# Blur is handled by SwayFX compositor effects.

# Emberstone Dark (inspired by Warp theme).
foreground #F8EDDC
background #242835
cursor #ECDA9C

# Normal colors.
color0 #242835
color1 #C84C53
color2 #CAA53E
color3 #7FA39F
color4 #00849A
color5 #A17AB5
color6 #9BBA51
color7 #F8EDDC

# Bright colors.
color8 #242835
color9 #EDB7BF
color10 #ECDA9C
color11 #A8E7D2
color12 #8AD9E9
color13 #D7C0E4
color14 #C9E295
color15 #E3E3E3

# Use simple default behavior and keep config deterministic.
confirm_os_window_close 0
